server {
    server_name DOMEN ;
    listen IP:443 ssl;
    
        

    ssl_certificate "/var/www/crt.crt";
    ssl_certificate_key "/var/www/key.key";

    charset utf-8;

    gzip on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/css image/x-ico application/pdf image/jpeg image/png image/gif application/javascript application/x-javascript application/x-pointplus application/json;
    gzip_comp_level 1;

    # Корень — сюда нужно выложить сборку фронтенда (dist)
    set $root_path /path/to/your/project;
    root $root_path;
    disable_symlinks if_not_owner from=$root_path;

    # API: проксируем на Node.js backend (Express на 4000 порту)
    location ^~ /api/ {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Если потом добавишь WebSocket, тогда настроим Upgrade/Connection через map в http{}
        # proxy_set_header Upgrade           $http_upgrade;
        # proxy_set_header Connection        "upgrade";
    }

    # Основное приложение (React SPA)
    location / {
        index index.html;

        # Важно для SPA: все несуществующие пути отдаём на index.html
        try_files $uri $uri/ /index.html;
    }

    # Аватарки и другие загруженные файлы
    # ^~ гарантирует, что этот location не будет перекрыт regex-локацией со статикой,
    # поэтому /api/uploads/... всегда уходит на Express, который раздаёт файлы.
    location ^~ /api/uploads/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Статика (можно оставить как есть, либо чуть упростить)
    location ~* ^.+\.(jpg|jpeg|gif|png|svg|js|css|mp3|ogg|mpeg|avi|zip|gz|bz2|rar|swf|ico|7z|doc|docx|map|otf|pdf|ttf|tif|txt|wav|webp|woff|woff2|xls|xlsx|xml)$ {
        try_files $uri $uri/ =404;
    }

# Если используется FastPanel
   # include "/etc/nginx/fastpanel2-sites/admin107_fvd_usr/admin107.fvds.ru.includes";
   # include /etc/nginx/fastpanel2-includes/*.conf;
}
server {
    server_name DOMEN ;
    listen IP:80;
    return 301 https://$host$request_uri;

}